name: Deploy Next.js Website

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            export PATH=$PATH:/usr/bin

            echo "===== STEP 0: whoami / pwd ====="
            whoami
            pwd

            echo "===== STEP 1: cd ====="
            cd /home/ubuntu/Dilshaj-Infotech-Website
            echo "CD OK"

            echo "===== STEP 2: git status ====="
            git status || true

            echo "===== STEP 3: git pull ====="
            git pull origin master

            echo "===== STEP 4: clean ====="
            rm -rf .next

            echo "===== STEP 5: node/npm ====="
            node -v
            npm -v

            echo "===== STEP 6: install ====="
            npm install

            echo "===== STEP 7: build ====="
            npm run build

            echo "===== STEP 8: pm2 ====="
            which pm2
            pm2 delete nextjs-app || true
            pm2 start npm --name "nextjs-app" -- start

            pm2 save

            echo "===== DONE ====="
