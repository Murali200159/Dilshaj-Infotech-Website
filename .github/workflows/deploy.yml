script: |
  set -ex   # 🔥 x = print commands, e = stop on error

  export PATH=$PATH:/usr/bin

  cd /home/ubuntu/Dilshaj-Infotech-Website

  echo "STEP 1: Git"
  git reset --hard
  git pull origin master

  echo "STEP 2: Clean"
  rm -rf .next

  echo "STEP 3: Install"
  npm install

  echo "STEP 4: Build"
  npm run build

  echo "STEP 5: PM2 delete"
  pm2 delete nextjs-app || true

  echo "STEP 6: PM2 start"
  pm2 start npm --name "nextjs-app" -- start

  echo "STEP 7: PM2 save"
  pm2 save

  echo "DONE"
